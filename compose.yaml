services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: ${APP_TARGET:-dev}
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    environment:
      DB_DSN: "pgsql:host=db;dbname=constraint_engine"
      DB_USER: ${DB_USER:-app}
      DB_PASS: ${DB_PASS:-secret}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5-20250929}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/var/www/html:ro
    depends_on:
      - app
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: constraint_engine
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASS:-secret}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-app} -d constraint_engine"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  db_data:
  vendor:
