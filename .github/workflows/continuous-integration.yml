name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
        env:
          POSTGRES_DB: constraint_engine_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d constraint_engine_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    strategy:
      matrix:
        operating-system:
          - ubuntu-latest
        php-version:
          - '8.4'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo_pgsql
          coverage: none
          tools: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --ignore-platform-req=php --no-scripts

      - name: Setup database
        run: php bin/setup.php
        env:
          DB_DSN: "pgsql:host=localhost;dbname=constraint_engine_test"
          DB_USER: app
          DB_PASS: secret

      - name: Run test suite
        run: ./vendor/bin/phpunit
        env:
          DB_DSN: "pgsql:host=localhost;dbname=constraint_engine_test"
          DB_USER: app
          DB_PASS: secret
